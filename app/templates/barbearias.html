{% extends "base.html" %}
{% block content %}
<div class="container text-center">
    <h2 class="mb-4">Escolha uma Unidade</h2>
    <div class="row">
        {% for salao in saloes %}
        <div class="col-md-4 mb-3">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title">{{ salao.nome }}</h5>
                    <p class="card-text text-muted">{{ salao.endereco }}</p>
                    <a href="{{ url_for('main.agendar', salao_id=salao.id) }}" class="btn btn-dark">Selecionar este Salão</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
