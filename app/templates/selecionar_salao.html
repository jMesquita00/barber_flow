{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2 class="text-center mb-4">Escolha uma Unidade</h2>
    <div class="row">
        {% for salao in saloes %}
        <div class="col-md-4 mb-3">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center">
                    <h5 class="card-title">{{ salao.nome }}</h5>
                    <p class="card-text text-muted">{{ salao.endereco }}</p>
                    <a href="{{ url_for('main.agendar', salao_id=salao.id) }}" class="btn btn-dark w-100">
                        Selecionar esta Unidade
                    </a>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12 text-center">
            <p class="alert alert-warning">Nenhuma barbearia cadastrada no momento.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
