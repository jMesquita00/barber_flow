{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 shadow p-4 bg-white rounded">
        <h2 class="text-center mb-4">Criar Conta</h2>
        
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nome Completo</label>
                <input type="text" name="nome" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" required>
            </div>

            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" name="is_admin" id="is_admin" onchange="toggleBarbeariaFields()">
                <label class="form-check-label" for="is_admin">
                    <strong>Sou dono de barbearia</strong>
                </label>
            </div>

            <div id="campos_barbearia" style="display: none;" class="p-3 mb-3 border rounded bg-light">
                <h5 class="text-muted">Dados da sua Unidade</h5>
                <div class="mb-3">
                    <label class="form-label">Nome da Barbearia</label>
                    <input type="text" name="nome_barbearia" id="input_nome_barbearia" class="form-control" placeholder="Ex: Barbearia do Centro">
                </div>
                <div class="mb-3">
                    <label class="form-label">Endereço Completo</label>
                    <input type="text" name="endereco_barbearia" id="input_endereco_barbearia" class="form-control" placeholder="Rua, Número, Bairro">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 shadow-sm">Finalizar Cadastro</button>
        </form>
    </div>
</div>

<script>
function toggleBarbeariaFields() {
    const checkbox = document.getElementById('is_admin');
    const camposExtra = document.getElementById('campos_barbearia');
    const nomeInput = document.getElementById('input_nome_barbearia');
    const enderecoInput = document.getElementById('input_endereco_barbearia');

    if (checkbox.checked) {
        camposExtra.style.display = 'block';
        nomeInput.required = true;    // Torna obrigatório se for admin
        enderecoInput.required = true;
    } else {
        camposExtra.style.display = 'none';
        nomeInput.required = false;   // Remove obrigatoriedade se for cliente
        enderecoInput.required = false;
    }
}
</script>
{% endblock %}
